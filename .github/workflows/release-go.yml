name: Release Go Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            binary: stardodgerplus
            archive: stardodgerplus-linux-amd64.tar.gz
          - name: macos
            os: macos-latest
            binary: stardodgerplus
            archive: stardodgerplus-macos.tar.gz
          - name: windows-amd64
            os: windows-latest
            binary: stardodgerplus.exe
            archive: stardodgerplus-windows-amd64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libc6-dev \
            libasound2-dev \
            libgl1-mesa-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxxf86vm-dev \
            pkg-config

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        shell: bash
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/${{ matrix.binary }}" ./go/cmd/stardodgerplus

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tar -C dist -czf "dist/${{ matrix.archive }}" "${{ matrix.binary }}"

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ matrix.binary }}" -DestinationPath "dist/${{ matrix.archive }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.archive }}
