name: CI

on:
  push:
  pull_request:

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    env:
      SDL_AUDIODRIVER: dummy
      SDL_VIDEODRIVER: dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Run Python tests
        run: uv run python -m unittest discover -s python/tests
      - name: Check Python entry points
        run: |
          uv run star-dodger --help
          uv run star-dodger-plus --help

  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libc6-dev \
            libasound2-dev \
            libgl1-mesa-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxxf86vm-dev \
            pkg-config
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run Go tests
        run: go test ./go/internal/nameentry
      - name: Build Go Plus
        run: go build ./go/cmd/stardodgerplus
